<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>unit converter</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="hero">
                <h2>                                                                                     
                    Metric/Imperial Unit Conversion
                </h2>
                <input type="number" id="input-el">
                <button id="covert-btn">Convert</button>
            </div>
            <div class="results">
                <div class="card">
                    <h3>
                        Length (meter/feet)
                    </h3>
                    <p id="meters-feet-el">
                    </p> 

                </div>
                <div class="card">
                    <h3>
                        Volume (litters/gallons)
                    </h3>
                    <p id="litters-gallons-el">
                    </p> 
                </div>
                <div class="card">
                    <h3>
                        Mass (kilograms/pounds)
                    </h3>
                    <p id="kilos-pounds-el">
                    </p> 
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
